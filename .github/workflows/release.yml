name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: gh-monitor-linux-x86_64.tar.gz
            binary: gh-monitor
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: gh-monitor-macos-x86_64.tar.gz
            binary: gh-monitor
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: gh-monitor-macos-aarch64.tar.gz
            binary: gh-monitor
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: gh-monitor-windows-x86_64.zip
            binary: gh-monitor.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Build
        run: cargo build --release -p gh-monitor-app --target ${{ matrix.target }} --locked
      - name: Package
        shell: bash
        run: |
          mkdir -p release
          BINARY_PATH="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            powershell Compress-Archive -Path "$BINARY_PATH" -DestinationPath "release/${{ matrix.archive }}"
          else
            cp "$BINARY_PATH" "release/${{ matrix.binary }}"
            (cd release && tar czf "${{ matrix.archive }}" "${{ matrix.binary }}")
            rm "release/${{ matrix.binary }}"
          fi
          sha256sum "release/${{ matrix.archive }}" > "release/${{ matrix.archive }}.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: release/${{ matrix.archive }}*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
