name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            libxdo-dev librsvg2-dev libdbus-1-dev libudev-dev libwayland-dev \
            libxkbcommon-x11-0 libxcb1-dev libx11-xcb-dev libfontconfig1-dev
      - name: Run tests
        run: cargo test --workspace --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Upload LCOV artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: error
      - name: Upload to Coveralls
        if: env.COVERALLS_REPO_TOKEN != null
        uses: coverallsapp/github-action@v2
        with:
          file: lcov.info
          flag_name: rust-ubuntu
          parallel: false
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

  build:
    name: Build release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: gh-monitor-linux-x86_64
            artifact_path: gh-monitor
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: gh-monitor-macos-x86_64
            artifact_path: gh-monitor
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: gh-monitor-macos-aarch64
            artifact_path: gh-monitor
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: gh-monitor-windows-x86_64
            artifact_path: gh-monitor.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            libxdo-dev librsvg2-dev libdbus-1-dev libudev-dev libwayland-dev \
            libxkbcommon-x11-0 libxcb1-dev libx11-xcb-dev libfontconfig1-dev
      - name: Build
        run: cargo build --release -p gh-monitor-app --target ${{ matrix.target }}
      - name: Locate binary
        id: binary
        run: |
          BINARY_PATH=$(find target/${{ matrix.target }}/release -maxdepth 1 -name '${{ matrix.artifact_path }}' -type f | head -n 1)
          echo "path=$BINARY_PATH" >> $GITHUB_OUTPUT
          echo "Found binary at: $BINARY_PATH"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.binary.outputs.path }}
          if-no-files-found: error
